global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kenny
    static_configs:
      - targets: ['kenny:8080']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics

  - job_name: alloy
    static_configs:
      - targets: ['alloy:12345']
    metrics_path: /metrics
